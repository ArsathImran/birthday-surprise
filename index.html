<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday Stevanny</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Sora:wght@600;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg-1: #091225;
            --bg-2: #142d63;
            --bg-3: #f04e98;
            --glow-pink: #ff7bc0;
            --glow-blue: #7bd4ff;
            --glass: rgba(255, 255, 255, 0.14);
            --glass-border: rgba(255, 255, 255, 0.24);
            --text: #f9fbff;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Poppins", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 20% 20%, rgba(123, 212, 255, 0.22), transparent 24%),
                radial-gradient(circle at 80% 18%, rgba(240, 78, 152, 0.22), transparent 26%),
                linear-gradient(145deg, var(--bg-1), var(--bg-2) 58%, #220a38 100%);
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }

        .background-glow,
        .background-glow::before,
        .background-glow::after {
            position: absolute;
            inset: auto;
            border-radius: 999px;
            filter: blur(18px);
            opacity: 0.7;
            pointer-events: none;
            content: "";
        }

        .background-glow {
            width: 260px;
            height: 260px;
            background: rgba(123, 212, 255, 0.2);
            top: -80px;
            right: -30px;
            animation: drift 12s ease-in-out infinite alternate;
        }

        .background-glow::before {
            width: 240px;
            height: 240px;
            background: rgba(255, 123, 192, 0.16);
            top: 290px;
            left: -100px;
            animation: drift 14s ease-in-out infinite alternate-reverse;
        }

        .background-glow::after {
            width: 190px;
            height: 190px;
            background: rgba(255, 226, 138, 0.15);
            top: 470px;
            right: 180px;
            animation: drift 10s ease-in-out infinite alternate;
        }

        .balloon-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .balloon {
            position: absolute;
            bottom: -180px;
            width: 78px;
            height: 98px;
            border-radius: 50% 50% 48% 48%;
            opacity: 0.95;
            animation: floatUp linear infinite;
            box-shadow: inset -10px -14px 20px rgba(0, 0, 0, 0.14);
        }

        .balloon::before {
            content: "";
            position: absolute;
            width: 18px;
            height: 18px;
            left: 50%;
            bottom: -8px;
            transform: translateX(-50%) rotate(45deg);
            background: inherit;
            border-radius: 3px;
        }

        .balloon::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 98px;
            width: 2px;
            height: 120px;
            transform: translateX(-50%);
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.08));
        }

        .balloon.b1 { left: 6%; background: linear-gradient(180deg, #ff9ed0, #ff4e97); animation-duration: 16s; animation-delay: -2s; }
        .balloon.b2 { left: 18%; width: 64px; height: 84px; background: linear-gradient(180deg, #8fe3ff, #4ca7ff); animation-duration: 14s; animation-delay: -8s; }
        .balloon.b3 { left: 32%; background: linear-gradient(180deg, #ffe494, #ffb347); animation-duration: 18s; animation-delay: -4s; }
        .balloon.b4 { left: 52%; width: 70px; height: 90px; background: linear-gradient(180deg, #bba8ff, #7a69ff); animation-duration: 15s; animation-delay: -11s; }
        .balloon.b5 { left: 72%; background: linear-gradient(180deg, #9ff2bf, #37c978); animation-duration: 17s; animation-delay: -6s; }
        .balloon.b6 { left: 86%; width: 68px; height: 86px; background: linear-gradient(180deg, #ffc2a8, #ff7f50); animation-duration: 13s; animation-delay: -9s; }

        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 0 14px rgba(255, 255, 255, 0.95);
            animation: twinkle 3.4s ease-in-out infinite;
            pointer-events: none;
        }

        .sparkle.s1 { top: 14%; left: 12%; animation-delay: 0s; }
        .sparkle.s2 { top: 18%; left: 78%; animation-delay: 1s; }
        .sparkle.s3 { top: 66%; left: 16%; animation-delay: 2s; }
        .sparkle.s4 { top: 72%; left: 82%; animation-delay: 1.5s; }
        .sparkle.s5 { top: 26%; left: 52%; animation-delay: 0.5s; }

        main {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 24px 48px;
        }

        .hero {
            width: min(100%, 860px);
            padding: clamp(28px, 5vw, 54px);
            border-radius: 32px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.06));
            border: 1px solid var(--glass-border);
            box-shadow:
                0 18px 60px rgba(0, 0, 0, 0.28),
                inset 0 1px 0 rgba(255, 255, 255, 0.28);
            backdrop-filter: blur(14px);
            text-align: center;
        }

        .eyebrow {
            margin: 0 0 12px;
            font-size: 0.92rem;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.82);
        }

        h1 {
            margin: 0;
            font-family: "Sora", sans-serif;
            font-size: clamp(2.6rem, 8vw, 5.8rem);
            line-height: 0.98;
            text-wrap: balance;
            text-shadow:
                0 0 10px rgba(255, 255, 255, 0.9),
                0 0 28px rgba(255, 123, 192, 0.7),
                0 0 48px rgba(123, 212, 255, 0.55);
        }

        .gradient-text {
            background: linear-gradient(135deg, #ffffff 0%, #ffd7e9 24%, #99ddff 58%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            width: min(100%, 560px);
            margin: 20px auto 0;
            font-size: clamp(1rem, 2.6vw, 1.18rem);
            line-height: 1.7;
            color: rgba(248, 251, 255, 0.86);
        }

        .cta {
            margin-top: 30px;
            border: none;
            border-radius: 999px;
            padding: 16px 32px;
            font: inherit;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            background: linear-gradient(135deg, #ff5ca8, #7d6bff 50%, #46c7ff);
            box-shadow:
                0 14px 28px rgba(0, 0, 0, 0.24),
                0 0 24px rgba(255, 92, 168, 0.42),
                0 0 34px rgba(70, 199, 255, 0.22);
            transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
        }

        .cta:hover {
            transform: translateY(-2px) scale(1.02);
            filter: brightness(1.05);
            box-shadow:
                0 16px 32px rgba(0, 0, 0, 0.28),
                0 0 28px rgba(255, 92, 168, 0.5),
                0 0 42px rgba(70, 199, 255, 0.3);
        }

        .cta:active {
            transform: scale(0.98);
        }

        @keyframes floatUp {
            0% {
                transform: translate3d(0, 0, 0) rotate(0deg);
            }
            50% {
                transform: translate3d(16px, -52vh, 0) rotate(4deg);
            }
            100% {
                transform: translate3d(-14px, -125vh, 0) rotate(-4deg);
            }
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.25;
                transform: scale(0.85);
            }
            50% {
                opacity: 1;
                transform: scale(1.25);
            }
        }

        @keyframes drift {
            from {
                transform: translate3d(0, 0, 0) scale(1);
            }
            to {
                transform: translate3d(18px, 24px, 0) scale(1.08);
            }
        }

        @media (max-width: 768px) {
            main {
                align-items: flex-start;
                padding: 28px 16px 36px;
            }

            .hero {
                margin-top: 12px;
            }

            .subtitle {
                margin-top: 16px;
            }

            .cta {
                width: 100%;
                padding: 15px 22px;
                margin-top: 26px;
            }
        }

        @media (max-width: 640px) {
            .hero {
                border-radius: 26px;
                padding: 28px 20px 30px;
            }

            .cta {
                width: 100%;
                padding: 15px 22px;
            }
        }
    </style>
</head>
<body>
    <div class="background-glow"></div>

    <div class="balloon-layer" aria-hidden="true">
        <div class="balloon b1"></div>
        <div class="balloon b2"></div>
        <div class="balloon b3"></div>
        <div class="balloon b4"></div>
        <div class="balloon b5"></div>
        <div class="balloon b6"></div>
        <div class="sparkle s1"></div>
        <div class="sparkle s2"></div>
        <div class="sparkle s3"></div>
        <div class="sparkle s4"></div>
        <div class="sparkle s5"></div>
    </div>

    <main>
        <section class="hero">
            <p class="eyebrow">A little birthday moment</p>
            <h1><span class="gradient-text">Happy Birthday Stevanny</span></h1>
            <p class="subtitle">Balloons are up, lights are glowing, and your surprise is waiting on the next page.</p>
            <button class="cta" id="surpriseButton" type="button">Click here to see your surprise</button>
        </section>
    </main>

    <script>
        const musicState = {
            context: null,
            gain: null,
            playing: false,
            sequenceId: 0
        };

        function ensureAudioContext() {
            if (!musicState.context) {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (!AudioContextClass) {
                    return null;
                }

                musicState.context = new AudioContextClass();
                musicState.gain = musicState.context.createGain();
                musicState.gain.gain.value = 0.05;
                musicState.gain.connect(musicState.context.destination);
            }

            return musicState.context;
        }

        function noteFrequency(note) {
            const map = {
                C4: 261.63,
                D4: 293.66,
                E4: 329.63,
                F4: 349.23,
                G4: 392.0,
                A4: 440.0,
                Bb4: 466.16,
                C5: 523.25
            };
            return map[note];
        }

        function scheduleHappyBirthday(loop = true) {
            const context = ensureAudioContext();
            if (!context || musicState.playing) {
                return;
            }

            const melody = [
                ["G4", 0.32], ["G4", 0.2], ["A4", 0.52], ["G4", 0.52], ["C5", 0.52], ["B4", 0.92],
                ["G4", 0.32], ["G4", 0.2], ["A4", 0.52], ["G4", 0.52], ["D5", 0.52], ["C5", 0.92],
                ["G4", 0.32], ["G4", 0.2], ["G5", 0.52], ["E5", 0.52], ["C5", 0.52], ["B4", 0.52], ["A4", 0.92],
                ["F5", 0.32], ["F5", 0.2], ["E5", 0.52], ["C5", 0.52], ["D5", 0.52], ["C5", 1.0]
            ];

            const extraMap = {
                B4: 493.88,
                D5: 587.33,
                E5: 659.25,
                F5: 698.46,
                G5: 783.99
            };

            const startAt = context.currentTime + 0.08;
            let now = startAt;
            const currentId = ++musicState.sequenceId;

            musicState.playing = true;

            melody.forEach(([note, duration]) => {
                const frequency = noteFrequency(note) || extraMap[note];
                const oscillator = context.createOscillator();
                const noteGain = context.createGain();
                oscillator.type = "sine";
                oscillator.frequency.value = frequency;
                noteGain.gain.setValueAtTime(0.0001, now);
                noteGain.gain.exponentialRampToValueAtTime(0.24, now + 0.04);
                noteGain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
                oscillator.connect(noteGain);
                noteGain.connect(musicState.gain);
                oscillator.start(now);
                oscillator.stop(now + duration + 0.03);
                now += duration + 0.04;
            });

            const totalLength = (now - startAt) * 1000;
            window.setTimeout(() => {
                if (musicState.sequenceId !== currentId) {
                    return;
                }
                musicState.playing = false;
                if (loop) {
                    scheduleHappyBirthday(true);
                }
            }, totalLength + 120);
        }

        async function startMusic() {
            const context = ensureAudioContext();
            if (!context) {
                return;
            }

            if (context.state === "suspended") {
                try {
                    await context.resume();
                } catch (error) {
                    return;
                }
            }

            scheduleHappyBirthday(true);
        }

        window.addEventListener("load", () => {
            startMusic();
        }, { once: true });

        ["pointerdown", "keydown", "touchstart"].forEach((eventName) => {
            window.addEventListener(eventName, startMusic, { once: true, passive: true });
        });

        document.getElementById("surpriseButton").addEventListener("click", () => {
            startMusic();
            window.location.href = "surprise.html";
        });
    </script>
</body>
</html>
