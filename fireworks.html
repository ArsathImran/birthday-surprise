<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday Fireworks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Sora:wght@600;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --text: #f8fbff;
            --glass: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.18);
            --pink: #ff72b7;
            --blue: #65d5ff;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: "Poppins", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 20% 20%, rgba(101, 213, 255, 0.08), transparent 24%),
                radial-gradient(circle at 82% 18%, rgba(255, 114, 183, 0.08), transparent 26%),
                linear-gradient(180deg, #040814 0%, #05030c 52%, #000000 100%);
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }

        canvas {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #starCanvas {
            z-index: 0;
        }

        #fireworksCanvas {
            z-index: 1;
        }

        .overlay {
            position: relative;
            z-index: 4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 24px 56px;
            pointer-events: none;
        }

        .hero {
            width: min(100%, 900px);
            text-align: center;
            pointer-events: auto;
            margin: auto;
        }

        h1 {
            margin: 0;
            font-family: "Sora", sans-serif;
            font-size: clamp(2.5rem, 8vw, 5.8rem);
            line-height: 0.98;
            text-shadow:
                0 0 10px rgba(255, 255, 255, 0.95),
                0 0 24px rgba(255, 114, 183, 0.7),
                0 0 52px rgba(101, 213, 255, 0.52),
                0 0 82px rgba(255, 255, 255, 0.22);
        }

        .title-gradient {
            background: linear-gradient(135deg, #ffffff, #ffd7e8 34%, #94ddff 72%, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            width: min(100%, 580px);
            margin: 16px auto 0;
            font-size: clamp(1rem, 2.5vw, 1.14rem);
            line-height: 1.7;
            color: rgba(248, 251, 255, 0.84);
        }

        .buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 28px;
        }

        .wish-btn,
        .back-btn {
            border: none;
            border-radius: 999px;
            padding: 15px 26px;
            font: inherit;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            background: linear-gradient(135deg, #ff5ca8, #8167ff 52%, #46c7ff);
            box-shadow:
                0 14px 28px rgba(0, 0, 0, 0.24),
                0 0 22px rgba(255, 92, 168, 0.38),
                0 0 30px rgba(70, 199, 255, 0.22);
            transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
        }

        .wish-btn:hover,
        .back-btn:hover {
            transform: translateY(-2px) scale(1.02);
            filter: brightness(1.04);
        }

        .wish-btn:active,
        .back-btn:active {
            transform: scale(0.98);
        }

        .heart-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 3;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            bottom: -24px;
            width: 16px;
            height: 16px;
            transform: rotate(45deg);
            animation: heartFloat linear forwards;
            opacity: 0.8;
            filter: drop-shadow(0 0 10px rgba(255, 114, 183, 0.45));
        }

        .heart::before,
        .heart::after {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: inherit;
        }

        .heart::before {
            top: -8px;
            left: 0;
        }

        .heart::after {
            left: -8px;
            top: 0;
        }

        .modal {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background: rgba(4, 7, 18, 0.45);
            backdrop-filter: blur(10px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.28s ease;
            z-index: 8;
        }

        .modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            width: min(100%, 540px);
            max-height: min(80vh, 620px);
            padding: 22px;
            border-radius: 26px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.08));
            border: 1px solid var(--glass-border);
            box-shadow:
                0 24px 60px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(18px);
        }

        .modal-title {
            margin: 0 0 14px;
            font-family: "Sora", sans-serif;
            font-size: 1.4rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .modal-message {
            max-height: min(52vh, 360px);
            overflow-y: auto;
            padding-right: 8px;
            line-height: 1.8;
            color: rgba(248, 251, 255, 0.92);
            word-break: break-word;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.45) transparent;
        }

        .modal-message::-webkit-scrollbar {
            width: 8px;
        }

        .modal-message::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 999px;
        }

        .modal-actions {
            margin-top: 18px;
            display: flex;
            justify-content: flex-end;
        }

        @keyframes heartFloat {
            0% {
                transform: translate3d(0, 0, 0) rotate(45deg) scale(0.85);
                opacity: 0;
            }
            12% {
                opacity: 0.85;
            }
            100% {
                transform: translate3d(var(--heart-drift, 0px), -118vh, 0) rotate(45deg) scale(1.2);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .overlay {
                align-items: flex-start;
                padding: 24px 16px 40px;
            }

            .hero {
                width: 100%;
            }

            .subtitle {
                margin-top: 14px;
            }

            .buttons {
                gap: 12px;
                margin-top: 24px;
            }

            .wish-btn,
            .back-btn {
                width: 100%;
                padding: 15px 20px;
            }

            .modal {
                align-items: flex-start;
                overflow-y: auto;
                padding: 16px;
            }

            .modal-card {
                width: min(100%, 100%);
                max-height: none;
                margin: auto 0;
            }

            .modal-message {
                max-height: 48vh;
            }
        }

        @media (max-width: 640px) {
            .overlay {
                padding: 18px;
            }

            .wish-btn {
                width: 100%;
            }

            .modal-card {
                padding: 18px;
            }
        }
    </style>
</head>
<body>
    <canvas id="starCanvas"></canvas>
    <canvas id="fireworksCanvas"></canvas>

    <div class="heart-layer" id="heartLayer" aria-hidden="true"></div>

    <main class="overlay">
        <section class="hero">
            <h1><span class="title-gradient">Happy Birthday Stevanny</span></h1>
            <p class="subtitle">A sky full of stars, glowing sparks, floating hearts, and two sweet wishes waiting for you.</p>

            <div class="buttons">
                <button
                    class="wish-btn"
                    type="button"
                    data-title="Wish from your twin"
                    data-message="Hey Stevanny 🎂✨, happy birthday to you 🎉💖. You are not alone 🤍, we are always here with you 🫶. I hope this year brings you peace 🌸, happiness 😊, strength 💪, and all the beautiful things  your heart has been waiting for 💫. You deserve to feel deeply loved ❤️, appreciated 🌷, and celebrated 🎊 every single day. Keep smiling 😊, keep shining ✨, and please take good care of yourself always 🤍🌼."
                >
                    Wish from you twin
                </button>

                <button
                    class="wish-btn"
                    type="button"
                    data-title="Wish from chaa"
                    data-message="Hey beauty, this is chaa here i wanted to say that | HAPPY BIRTHDAY 🎂 to the most gorgeous girl ✨  in the world remembering that your presence are worthy here and dont forget to keep glow up and show that your are the most coolest person here with lowkey please take care of your health, eat well, breath well, make up well, dressed beautifully and always does something benefits to yourself okay?? Your enough and the world needs you to survive here > Selamat Ultah ya? 💐🎀💕"
                >
                    Wish from chaa
                </button>
            </div>
        </section>
    </main>

    <div class="modal" id="messageModal" aria-hidden="true">
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <h2 class="modal-title" id="modalTitle"></h2>
            <div class="modal-message" id="modalMessage"></div>
            <div class="modal-actions">
                <button class="back-btn" id="closeModal" type="button">Back</button>
            </div>
        </div>
    </div>

    <script>
        const starCanvas = document.getElementById("starCanvas");
        const fireworksCanvas = document.getElementById("fireworksCanvas");
        const starCtx = starCanvas.getContext("2d");
        const fxCtx = fireworksCanvas.getContext("2d");
        const heartLayer = document.getElementById("heartLayer");
        const modal = document.getElementById("messageModal");
        const modalTitle = document.getElementById("modalTitle");
        const modalMessage = document.getElementById("modalMessage");
        const closeModalButton = document.getElementById("closeModal");

        let width = window.innerWidth;
        let height = window.innerHeight;
        let lastTime = performance.now();
        let spawnTimer = 0;
        let heartTimer = 0;

        const stars = [];
        const rockets = [];
        const particles = [];
        const gravity = 130;
        const rocketSpeed = 520;
        const particleDrag = 0.985;
        const maxRockets = 8;

        const fireworkPalettes = [
            ["#ff7bbf", "#ffd0e7", "#ffffff"],
            ["#7bd7ff", "#b7efff", "#ffffff"],
            ["#ffe07a", "#fff1bb", "#ffffff"],
            ["#9b8cff", "#d4ccff", "#ffffff"],
            ["#7df0b4", "#d6ffe9", "#ffffff"],
            ["#ff9b72", "#ffd1bf", "#ffffff"]
        ];

        const musicState = {
            context: null,
            gain: null,
            playing: false,
            sequenceId: 0
        };

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            starCanvas.width = width;
            starCanvas.height = height;
            fireworksCanvas.width = width;
            fireworksCanvas.height = height;
            createStars();
        }

        function createStars() {
            stars.length = 0;
            const count = Math.max(80, Math.floor((width * height) / 14000));

            for (let i = 0; i < count; i += 1) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2 + 0.4,
                    alpha: Math.random() * 0.8 + 0.2,
                    twinkleSpeed: 1.2 + Math.random() * 2.4,
                    phase: Math.random() * Math.PI * 2
                });
            }
        }

        function drawStars(timeSeconds) {
            starCtx.clearRect(0, 0, width, height);

            for (const star of stars) {
                const glow = 0.45 + Math.sin(timeSeconds * star.twinkleSpeed + star.phase) * 0.35;
                starCtx.globalAlpha = Math.max(0.12, star.alpha * glow);
                starCtx.beginPath();
                starCtx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                starCtx.fillStyle = "#ffffff";
                starCtx.fill();
            }

            starCtx.globalAlpha = 1;
        }

        function chooseLaunch() {
            const side = Math.floor(Math.random() * 3);
            if (side === 0) {
                return {
                    x: Math.random() * width,
                    y: height + 20,
                    vx: (Math.random() - 0.5) * 60,
                    vy: -rocketSpeed - Math.random() * 120,
                    targetY: height * (0.18 + Math.random() * 0.22)
                };
            }

            if (side === 1) {
                return {
                    x: -20,
                    y: height * (0.42 + Math.random() * 0.32),
                    vx: rocketSpeed * (0.92 + Math.random() * 0.18),
                    vy: -(120 + Math.random() * 110),
                    targetY: height * (0.14 + Math.random() * 0.24)
                };
            }

            return {
                x: width + 20,
                y: height * (0.42 + Math.random() * 0.32),
                vx: -rocketSpeed * (0.92 + Math.random() * 0.18),
                vy: -(120 + Math.random() * 110),
                targetY: height * (0.14 + Math.random() * 0.24)
            };
        }

        function launchRocket() {
            const launch = chooseLaunch();
            const palette = fireworkPalettes[Math.floor(Math.random() * fireworkPalettes.length)];

            rockets.push({
                x: launch.x,
                y: launch.y,
                vx: launch.vx,
                vy: launch.vy,
                targetY: launch.targetY,
                palette,
                trail: []
            });
        }

        function explode(x, y, palette) {
            const burstCount = 42 + Math.floor(Math.random() * 26);
            for (let i = 0; i < burstCount; i += 1) {
                const angle = (Math.PI * 2 * i) / burstCount + Math.random() * 0.2;
                const speed = 90 + Math.random() * 260;
                particles.push({
                    x,
                    y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1.2 + Math.random() * 0.9,
                    age: 0,
                    size: 1.8 + Math.random() * 1.8,
                    color: palette[Math.floor(Math.random() * palette.length)]
                });
            }
        }

        function updateRockets(dt) {
            for (let i = rockets.length - 1; i >= 0; i -= 1) {
                const rocket = rockets[i];
                rocket.vy += gravity * 0.35 * dt;
                rocket.x += rocket.vx * dt;
                rocket.y += rocket.vy * dt;

                rocket.trail.push({ x: rocket.x, y: rocket.y });
                if (rocket.trail.length > 9) {
                    rocket.trail.shift();
                }

                const reachedHeight = rocket.y <= rocket.targetY;
                const slowingDown = rocket.vy >= -60 && rocket.y < height * 0.45;
                const outsideX = rocket.x < -40 || rocket.x > width + 40;

                if (reachedHeight || slowingDown || outsideX) {
                    explode(rocket.x, rocket.y, rocket.palette);
                    rockets.splice(i, 1);
                }
            }
        }

        function drawRockets() {
            for (const rocket of rockets) {
                for (let i = 0; i < rocket.trail.length; i += 1) {
                    const point = rocket.trail[i];
                    const alpha = i / rocket.trail.length;
                    fxCtx.beginPath();
                    fxCtx.arc(point.x, point.y, 2.2 * alpha, 0, Math.PI * 2);
                    fxCtx.fillStyle = `rgba(255,255,255,${alpha * 0.65})`;
                    fxCtx.fill();
                }

                fxCtx.beginPath();
                fxCtx.arc(rocket.x, rocket.y, 2.6, 0, Math.PI * 2);
                fxCtx.fillStyle = "#ffffff";
                fxCtx.fill();
            }
        }

        function updateParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i -= 1) {
                const particle = particles[i];
                particle.age += dt;
                particle.vx *= particleDrag;
                particle.vy = particle.vy * particleDrag + gravity * dt * 0.65;
                particle.x += particle.vx * dt;
                particle.y += particle.vy * dt;

                if (particle.age >= particle.life) {
                    particles.splice(i, 1);
                }
            }
        }

        function drawParticles() {
            for (const particle of particles) {
                const lifeProgress = particle.age / particle.life;
                const alpha = Math.max(0, 1 - lifeProgress);
                fxCtx.beginPath();
                fxCtx.arc(particle.x, particle.y, particle.size * alpha, 0, Math.PI * 2);
                fxCtx.fillStyle = particle.color;
                fxCtx.globalAlpha = alpha;
                fxCtx.shadowBlur = 12;
                fxCtx.shadowColor = particle.color;
                fxCtx.fill();
            }

            fxCtx.globalAlpha = 1;
            fxCtx.shadowBlur = 0;
        }

        function createHeart() {
            const heart = document.createElement("div");
            heart.className = "heart";
            heart.style.left = `${Math.random() * width}px`;
            heart.style.background = Math.random() > 0.5
                ? "linear-gradient(135deg, #ff72b7, #ff8f6a)"
                : "linear-gradient(135deg, #ff72b7, #8f83ff)";
            heart.style.setProperty("--heart-drift", `${(Math.random() - 0.5) * 120}px`);
            heart.style.animationDuration = `${5.8 + Math.random() * 2.8}s`;
            heart.style.opacity = `${0.45 + Math.random() * 0.4}`;
            heartLayer.appendChild(heart);
            window.setTimeout(() => heart.remove(), 9000);
        }

        function animate(now) {
            const dt = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;

            drawStars(now * 0.001);

            fxCtx.clearRect(0, 0, width, height);
            fxCtx.fillStyle = "rgba(4, 4, 12, 0.14)";
            fxCtx.fillRect(0, 0, width, height);

            spawnTimer -= dt;
            if (spawnTimer <= 0 && rockets.length < maxRockets) {
                launchRocket();
                if (Math.random() > 0.62) {
                    launchRocket();
                }
                spawnTimer = 0.42 + Math.random() * 0.32;
            }

            heartTimer -= dt;
            if (heartTimer <= 0) {
                createHeart();
                heartTimer = 0.72 + Math.random() * 0.5;
            }

            updateRockets(dt);
            updateParticles(dt);
            drawRockets();
            drawParticles();

            requestAnimationFrame(animate);
        }

        function openModal(title, message) {
            modalTitle.textContent = title;
            modalMessage.textContent = message;
            modal.classList.add("show");
            modal.setAttribute("aria-hidden", "false");
        }

        function closeModal() {
            modal.classList.remove("show");
            modal.setAttribute("aria-hidden", "true");
        }

        function ensureAudioContext() {
            if (!musicState.context) {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (!AudioContextClass) {
                    return null;
                }

                musicState.context = new AudioContextClass();
                musicState.gain = musicState.context.createGain();
                musicState.gain.gain.value = 0.04;
                musicState.gain.connect(musicState.context.destination);
            }

            return musicState.context;
        }

        function scheduleHappyBirthday(loop = true) {
            const context = ensureAudioContext();
            if (!context || musicState.playing) {
                return;
            }

            const notes = {
                G4: 392.0,
                A4: 440.0,
                B4: 493.88,
                C5: 523.25,
                D5: 587.33,
                E5: 659.25,
                F5: 698.46,
                G5: 783.99
            };

            const melody = [
                ["G4", 0.32], ["G4", 0.2], ["A4", 0.52], ["G4", 0.52], ["C5", 0.52], ["B4", 0.92],
                ["G4", 0.32], ["G4", 0.2], ["A4", 0.52], ["G4", 0.52], ["D5", 0.52], ["C5", 0.92],
                ["G4", 0.32], ["G4", 0.2], ["G5", 0.52], ["E5", 0.52], ["C5", 0.52], ["B4", 0.52], ["A4", 0.92],
                ["F5", 0.32], ["F5", 0.2], ["E5", 0.52], ["C5", 0.52], ["D5", 0.52], ["C5", 1.0]
            ];

            const startAt = context.currentTime + 0.08;
            let pointer = startAt;
            const currentId = ++musicState.sequenceId;
            musicState.playing = true;

            melody.forEach(([note, duration]) => {
                const oscillator = context.createOscillator();
                const noteGain = context.createGain();
                oscillator.type = "sine";
                oscillator.frequency.value = notes[note];
                noteGain.gain.setValueAtTime(0.0001, pointer);
                noteGain.gain.exponentialRampToValueAtTime(0.18, pointer + 0.04);
                noteGain.gain.exponentialRampToValueAtTime(0.0001, pointer + duration);
                oscillator.connect(noteGain);
                noteGain.connect(musicState.gain);
                oscillator.start(pointer);
                oscillator.stop(pointer + duration + 0.03);
                pointer += duration + 0.04;
            });

            window.setTimeout(() => {
                if (currentId !== musicState.sequenceId) {
                    return;
                }
                musicState.playing = false;
                if (loop) {
                    scheduleHappyBirthday(true);
                }
            }, ((pointer - startAt) * 1000) + 120);
        }

        async function startMusic() {
            const context = ensureAudioContext();
            if (!context) {
                return;
            }

            if (context.state === "suspended") {
                try {
                    await context.resume();
                } catch (error) {
                    return;
                }
            }

            scheduleHappyBirthday(true);
        }

        document.querySelectorAll(".wish-btn").forEach((button) => {
            button.addEventListener("click", () => {
                startMusic();
                openModal(button.dataset.title, button.dataset.message);
            });
        });

        closeModalButton.addEventListener("click", closeModal);
        modal.addEventListener("click", (event) => {
            if (event.target === modal) {
                closeModal();
            }
        });

        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape") {
                closeModal();
            }
        });

        window.addEventListener("resize", resize);
        window.addEventListener("load", () => {
            resize();
            startMusic();
            requestAnimationFrame(animate);
        }, { once: true });

        ["pointerdown", "keydown", "touchstart"].forEach((eventName) => {
            window.addEventListener(eventName, startMusic, { once: true, passive: true });
        });
    </script>
</body>
</html>
