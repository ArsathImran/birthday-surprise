<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday Surprise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Sora:wght@600;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg-start: #1c1135;
            --bg-mid: #311d62;
            --bg-end: #12081f;
            --pink: #ff73b8;
            --blue: #75d5ff;
            --gold: #ffd36e;
            --text: #f9fbff;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Poppins", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 18% 18%, rgba(255, 115, 184, 0.25), transparent 24%),
                radial-gradient(circle at 82% 14%, rgba(117, 213, 255, 0.2), transparent 26%),
                linear-gradient(180deg, var(--bg-start), var(--bg-mid) 52%, var(--bg-end) 100%);
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(16px);
            opacity: 0.55;
            pointer-events: none;
        }

        .orb.one {
            width: 220px;
            height: 220px;
            top: -50px;
            left: -50px;
            background: rgba(255, 115, 184, 0.24);
            animation: drift 12s ease-in-out infinite alternate;
        }

        .orb.two {
            width: 260px;
            height: 260px;
            right: -80px;
            bottom: 80px;
            background: rgba(117, 213, 255, 0.18);
            animation: drift 14s ease-in-out infinite alternate-reverse;
        }

        .sparkles {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 14px rgba(255, 255, 255, 0.95);
            animation: twinkle 2.8s ease-in-out infinite;
        }

        .sparkle:nth-child(1) { top: 12%; left: 16%; animation-delay: 0.2s; }
        .sparkle:nth-child(2) { top: 22%; left: 76%; animation-delay: 1s; }
        .sparkle:nth-child(3) { top: 68%; left: 10%; animation-delay: 1.8s; }
        .sparkle:nth-child(4) { top: 74%; left: 85%; animation-delay: 0.6s; }
        .sparkle:nth-child(5) { top: 30%; left: 48%; animation-delay: 1.4s; }
        .sparkle:nth-child(6) { top: 56%; left: 64%; animation-delay: 2.2s; }

        main {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 24px 56px;
            position: relative;
            z-index: 2;
        }

        .card {
            width: min(100%, 900px);
            padding: clamp(24px, 4vw, 44px);
            border-radius: 32px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.16);
            box-shadow:
                0 22px 60px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(14px);
            text-align: center;
            margin: auto;
        }

        h1 {
            margin: 0;
            font-family: "Sora", sans-serif;
            font-size: clamp(2rem, 6vw, 4.4rem);
            line-height: 1.05;
            text-shadow:
                0 0 10px rgba(255, 255, 255, 0.9),
                0 0 28px rgba(255, 115, 184, 0.6),
                0 0 42px rgba(117, 213, 255, 0.45);
        }

        .gradient-title {
            background: linear-gradient(135deg, #fffdf8, #ffc4e1 35%, #a9e4ff 78%, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .description {
            width: min(100%, 560px);
            margin: 16px auto 0;
            font-size: clamp(1rem, 2.5vw, 1.12rem);
            line-height: 1.7;
            color: rgba(249, 251, 255, 0.84);
        }

        .cake-scene {
            position: relative;
            width: min(100%, 360px);
            height: 340px;
            margin: 26px auto 18px;
        }

        .cake-glow {
            position: absolute;
            left: 50%;
            bottom: 26px;
            width: 230px;
            height: 56px;
            transform: translateX(-50%);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 115, 184, 0.28), rgba(117, 213, 255, 0.1) 55%, transparent 72%);
            filter: blur(10px);
        }

        .plate {
            position: absolute;
            left: 50%;
            bottom: 30px;
            width: 250px;
            height: 26px;
            transform: translateX(-50%);
            border-radius: 999px;
            background: linear-gradient(180deg, #f6fbff, #cbd8f7);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
        }

        .cake {
            position: absolute;
            left: 50%;
            bottom: 48px;
            width: 220px;
            height: 170px;
            transform: translateX(-50%);
            animation: cakeFloat 3.4s ease-in-out infinite;
        }

        .layer {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 24px;
            box-shadow: inset 0 -8px 18px rgba(0, 0, 0, 0.12);
        }

        .layer.top {
            top: 54px;
            width: 150px;
            height: 56px;
            background: linear-gradient(180deg, #ffe4f1, #ffb9d8);
        }

        .layer.middle {
            top: 100px;
            width: 188px;
            height: 58px;
            background: linear-gradient(180deg, #fff0b6, #ffda6a);
        }

        .layer.bottom {
            top: 144px;
            width: 220px;
            height: 64px;
            background: linear-gradient(180deg, #c5efff, #73cbff);
        }

        .icing {
            position: absolute;
            left: 50%;
            top: 42px;
            width: 160px;
            height: 28px;
            transform: translateX(-50%);
            background: linear-gradient(180deg, #fffefe, #ffe8f3);
            border-radius: 18px;
        }

        .icing::before,
        .icing::after {
            content: "";
            position: absolute;
            bottom: -12px;
            width: 22px;
            height: 18px;
            background: inherit;
            border-radius: 0 0 12px 12px;
        }

        .icing::before {
            left: 22px;
        }

        .icing::after {
            right: 26px;
        }

        .candle {
            position: absolute;
            top: 4px;
            width: 14px;
            height: 46px;
            border-radius: 999px;
            background: repeating-linear-gradient(
                180deg,
                #ffffff 0,
                #ffffff 8px,
                #ff7dbd 8px,
                #ff7dbd 16px
            );
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
        }

        .candle.c1 { left: 52px; }
        .candle.c2 { left: 103px; }
        .candle.c3 { left: 154px; }

        .flame {
            position: absolute;
            left: 50%;
            bottom: 100%;
            width: 18px;
            height: 28px;
            transform: translateX(-50%);
            border-radius: 50% 50% 50% 50% / 58% 58% 42% 42%;
            background: radial-gradient(circle at 50% 30%, #fffef6 0%, #ffe06d 32%, #ff9538 70%, rgba(255, 149, 56, 0.2) 100%);
            box-shadow:
                0 0 12px rgba(255, 205, 83, 0.85),
                0 0 24px rgba(255, 120, 38, 0.45);
            transform-origin: center bottom;
            animation: flameFlicker 0.7s ease-in-out infinite;
        }

        .confetti {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .confetti span {
            position: absolute;
            top: -14px;
            width: 10px;
            height: 16px;
            border-radius: 3px;
            animation: fall linear infinite;
            opacity: 0.9;
        }

        .confetti span:nth-child(1) { left: 8%; background: #ff78bf; animation-duration: 7s; animation-delay: -2s; }
        .confetti span:nth-child(2) { left: 18%; background: #7ad6ff; animation-duration: 8s; animation-delay: -5s; }
        .confetti span:nth-child(3) { left: 32%; background: #ffd66c; animation-duration: 6.8s; animation-delay: -1s; }
        .confetti span:nth-child(4) { left: 48%; background: #8d7cff; animation-duration: 7.8s; animation-delay: -4s; }
        .confetti span:nth-child(5) { left: 64%; background: #7df0b4; animation-duration: 6.2s; animation-delay: -3s; }
        .confetti span:nth-child(6) { left: 78%; background: #ff9b72; animation-duration: 8.4s; animation-delay: -2.5s; }
        .confetti span:nth-child(7) { left: 88%; background: #ffd66c; animation-duration: 6.6s; animation-delay: -4.5s; }

        .cta {
            margin-top: 10px;
            border: none;
            border-radius: 999px;
            padding: 16px 34px;
            font: inherit;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            background: linear-gradient(135deg, #ff5ca8, #8167ff 52%, #46c7ff);
            box-shadow:
                0 14px 28px rgba(0, 0, 0, 0.24),
                0 0 24px rgba(255, 92, 168, 0.38),
                0 0 34px rgba(70, 199, 255, 0.22);
            transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
        }

        .cta:hover {
            transform: translateY(-2px) scale(1.02);
            filter: brightness(1.04);
        }

        .cta:active {
            transform: scale(0.98);
        }

        @keyframes drift {
            from { transform: translate3d(0, 0, 0) scale(1); }
            to { transform: translate3d(18px, 26px, 0) scale(1.06); }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.24; transform: scale(0.75); }
            50% { opacity: 1; transform: scale(1.18); }
        }

        @keyframes cakeFloat {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        @keyframes flameFlicker {
            0%, 100% { transform: translateX(-50%) scaleY(1) scaleX(1) rotate(0deg); }
            25% { transform: translateX(-52%) scaleY(1.08) scaleX(0.95) rotate(-4deg); }
            50% { transform: translateX(-48%) scaleY(0.95) scaleX(1.08) rotate(3deg); }
            75% { transform: translateX(-51%) scaleY(1.05) scaleX(0.96) rotate(-2deg); }
        }

        @keyframes fall {
            from { transform: translateY(-10vh) rotate(0deg); }
            to { transform: translateY(115vh) rotate(360deg); }
        }

        @media (max-width: 768px) {
            main {
                align-items: flex-start;
                padding: 24px 16px 40px;
            }

            .card {
                border-radius: 28px;
            }

            .description {
                margin-top: 14px;
            }

            .cake-scene {
                width: min(100%, 320px);
                height: 300px;
                margin: 22px auto 16px;
            }

            .cake-glow {
                width: 190px;
                height: 44px;
                bottom: 30px;
            }

            .plate {
                width: 210px;
            }

            .cake {
                width: 190px;
                height: 148px;
                bottom: 48px;
            }

            .layer.top {
                top: 50px;
                width: 128px;
                height: 48px;
            }

            .layer.middle {
                top: 90px;
                width: 164px;
                height: 50px;
            }

            .layer.bottom {
                top: 128px;
                width: 190px;
                height: 56px;
            }

            .icing {
                top: 38px;
                width: 136px;
                height: 24px;
            }

            .candle {
                width: 12px;
                height: 40px;
            }

            .candle.c1 { left: 44px; }
            .candle.c2 { left: 89px; }
            .candle.c3 { left: 134px; }

            .flame {
                width: 16px;
                height: 24px;
            }

            .cta {
                width: 100%;
                padding: 15px 20px;
                margin-top: 8px;
            }
        }

        @media (max-width: 640px) {
            .card {
                padding: 24px 18px 28px;
                border-radius: 26px;
            }

            .cake-scene {
                height: 310px;
            }

            .cta {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="orb one"></div>
    <div class="orb two"></div>

    <div class="sparkles" aria-hidden="true">
        <span class="sparkle"></span>
        <span class="sparkle"></span>
        <span class="sparkle"></span>
        <span class="sparkle"></span>
        <span class="sparkle"></span>
        <span class="sparkle"></span>
    </div>

    <main>
        <section class="card">
            <h1><span class="gradient-title">A cake made for your special day</span></h1>
            <p class="description">One more click and the night lights up with stars, fireworks, and birthday wishes.</p>

            <div class="cake-scene" aria-hidden="true">
                <div class="confetti">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

                <div class="cake-glow"></div>
                <div class="plate"></div>

                <div class="cake">
                    <div class="candle c1"><div class="flame"></div></div>
                    <div class="candle c2"><div class="flame"></div></div>
                    <div class="candle c3"><div class="flame"></div></div>
                    <div class="icing"></div>
                    <div class="layer top"></div>
                    <div class="layer middle"></div>
                    <div class="layer bottom"></div>
                </div>
            </div>

            <button class="cta" id="celebrateButton" type="button">Click here to celebrate</button>
        </section>
    </main>

    <script>
        const musicState = {
            context: null,
            gain: null,
            playing: false,
            sequenceId: 0
        };

        function ensureAudioContext() {
            if (!musicState.context) {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (!AudioContextClass) {
                    return null;
                }

                musicState.context = new AudioContextClass();
                musicState.gain = musicState.context.createGain();
                musicState.gain.gain.value = 0.045;
                musicState.gain.connect(musicState.context.destination);
            }

            return musicState.context;
        }

        function scheduleHappyBirthday(loop = true) {
            const context = ensureAudioContext();
            if (!context || musicState.playing) {
                return;
            }

            const notes = {
                G4: 392.0,
                A4: 440.0,
                B4: 493.88,
                C5: 523.25,
                D5: 587.33,
                E5: 659.25,
                F5: 698.46,
                G5: 783.99
            };

            const melody = [
                ["G4", 0.32], ["G4", 0.2], ["A4", 0.52], ["G4", 0.52], ["C5", 0.52], ["B4", 0.92],
                ["G4", 0.32], ["G4", 0.2], ["A4", 0.52], ["G4", 0.52], ["D5", 0.52], ["C5", 0.92],
                ["G4", 0.32], ["G4", 0.2], ["G5", 0.52], ["E5", 0.52], ["C5", 0.52], ["B4", 0.52], ["A4", 0.92],
                ["F5", 0.32], ["F5", 0.2], ["E5", 0.52], ["C5", 0.52], ["D5", 0.52], ["C5", 1.0]
            ];

            const startAt = context.currentTime + 0.08;
            let pointer = startAt;
            const currentId = ++musicState.sequenceId;

            musicState.playing = true;

            melody.forEach(([note, duration]) => {
                const oscillator = context.createOscillator();
                const noteGain = context.createGain();
                oscillator.type = "triangle";
                oscillator.frequency.value = notes[note];
                noteGain.gain.setValueAtTime(0.0001, pointer);
                noteGain.gain.exponentialRampToValueAtTime(0.2, pointer + 0.04);
                noteGain.gain.exponentialRampToValueAtTime(0.0001, pointer + duration);
                oscillator.connect(noteGain);
                noteGain.connect(musicState.gain);
                oscillator.start(pointer);
                oscillator.stop(pointer + duration + 0.03);
                pointer += duration + 0.04;
            });

            window.setTimeout(() => {
                if (currentId !== musicState.sequenceId) {
                    return;
                }
                musicState.playing = false;
                if (loop) {
                    scheduleHappyBirthday(true);
                }
            }, ((pointer - startAt) * 1000) + 120);
        }

        async function startMusic() {
            const context = ensureAudioContext();
            if (!context) {
                return;
            }

            if (context.state === "suspended") {
                try {
                    await context.resume();
                } catch (error) {
                    return;
                }
            }

            scheduleHappyBirthday(true);
        }

        window.addEventListener("load", () => {
            startMusic();
        }, { once: true });

        ["pointerdown", "keydown", "touchstart"].forEach((eventName) => {
            window.addEventListener(eventName, startMusic, { once: true, passive: true });
        });

        document.getElementById("celebrateButton").addEventListener("click", () => {
            startMusic();
            window.location.href = "fireworks.html";
        });
    </script>
</body>
</html>
