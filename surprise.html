<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Cake Time ✨</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(180deg, #0a0e27 0%, #1a1a3e 50%, #0d0221 100%);
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #title {
            font-size: clamp(1.8rem, 3vw, 2.6rem);
            font-weight: bold;
            text-align: center;
            margin-bottom: 3vh;
            animation: titleFade 1.5s ease-in;
            letter-spacing: 1px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            max-width: 90vw;
            padding: 0 3vw;
            text-align: center;
            flex-wrap: wrap;
        }

        #title .title-text {
            background: linear-gradient(135deg, #87ceeb, #4da6ff, #0052cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 10px rgba(74, 166, 255, 0.4));
            line-height: 1.1;
        }

        #title .emoji {
            font-size: 1.1em;
            margin: 0 0.4em;
            filter: none;
            text-shadow: none;
        }

        #cake-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 3vh 0;
            animation: cakeFloat 3s ease-in-out infinite;
        }

        #cake {
            font-size: 100px;
            animation: cakePulse 1.5s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8),
                         0 0 40px rgba(255, 100, 50, 0.6);
        }

        .candle {
            position: absolute;
            width: 3px;
            height: 30px;
            background: #ffd700;
            left: 50%;
            bottom: 80px;
            animation: candleFlicker 0.6s ease-in-out infinite;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.9),
                        0 0 20px rgba(255, 165, 0, 0.7);
        }

        .candle:nth-child(2) {
            left: 40%;
            animation-delay: 0.2s;
        }

        .candle:nth-child(3) {
            left: 60%;
            animation-delay: 0.4s;
        }

        #flame {
            position: absolute;
            width: 8px;
            height: 20px;
            background: radial-gradient(ellipse at center, #ffff00 0%, #ff6600 100%);
            left: 50%;
            transform: translateX(-50%);
            bottom: 25px;
            border-radius: 50% 50% 50% 0;
            animation: flameFlicker 0.5s ease-in-out infinite;
            box-shadow: 0 0 15px rgba(255, 200, 0, 0.9);
        }

        .sparkle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: sparkleGlow 1.5s ease-in-out infinite,
                        sparkleFloat 4s ease-in-out infinite;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.8);
            pointer-events: none;
            z-index: 5;
        }

        .particle {
            position: fixed;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #87ceeb, #4da6ff);
            border-radius: 50%;
            animation: particleFloat 3s ease-out forwards;
            pointer-events: none;
            z-index: 4;
        }

        @keyframes titleFade {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes cakePulse {
            0%, 100% {
                transform: scale(1) rotateZ(0deg);
            }
            25% {
                transform: scale(1.1) rotateZ(-2deg);
            }
            50% {
                transform: scale(1) rotateZ(0deg);
            }
            75% {
                transform: scale(1.05) rotateZ(2deg);
            }
        }

        @keyframes cakeFloat {
            0%, 100% {
                transform: translateY(-10px);
            }
            50% {
                transform: translateY(10px);
            }
        }

        @keyframes candleFlicker {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.8;
            }
        }

        @keyframes flameFlicker {
            0%, 100% {
                transform: translateX(-50%) scaleY(1) scaleX(1);
                opacity: 1;
            }
            25% {
                transform: translateX(-52%) scaleY(1.1) scaleX(0.95);
                opacity: 0.95;
            }
            50% {
                transform: translateX(-50%) scaleY(0.95) scaleX(1.05);
                opacity: 1;
            }
            75% {
                transform: translateX(-48%) scaleY(1.05) scaleX(0.98);
                opacity: 0.98;
            }
        }

        @keyframes sparkleGlow {
            0%, 100% {
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
        }

        @keyframes sparkleFloat {
            0%, 100% {
                transform: translateY(0) translateX(0);
            }
            25% {
                transform: translateY(-8px) translateX(4px);
            }
            50% {
                transform: translateY(-12px) translateX(0);
            }
            75% {
                transform: translateY(-6px) translateX(-4px);
            }
        }

        @keyframes particleFloat {
            0% {
                opacity: 1;
                transform: translateY(0) translateX(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) translateX(var(--tx));
            }
        }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0.2; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-4px); }
        }

        #back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(255, 20, 147, 0.8);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            z-index: 30;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.5);
        }

        #back-btn:hover {
            background: rgba(255, 20, 147, 1);
            box-shadow: 0 0 25px rgba(255, 20, 147, 0.8);
            transform: scale(1.05);
        }

        #celebrate-btn {
            margin-top: 1.5rem;
            padding: 0.9rem 1.8rem;
            border: none;
            border-radius: 999px;
            font-size: clamp(1rem, 3.2vw, 1.2rem);
            color: white;
            font-weight: bold;
            background: linear-gradient(135deg, #ff69b4, #9370db, #4b8bff);
            box-shadow: 0 0 18px rgba(255, 105, 180, 0.6), 0 0 30px rgba(115, 56, 178, 0.6);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.3s ease, opacity 0.3s ease;
            z-index: 20;
            animation: celebratePulse 2s ease-in-out infinite;
        }

        #celebrate-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 26px rgba(255, 105, 180, 0.8), 0 0 40px rgba(115, 56, 178, 0.8);
        }

        #celebrate-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .screen-transition {
            transition: opacity 0.8s ease, transform 0.8s ease, filter 0.8s ease;
            opacity: 0;
            transform: scale(1.08);
            filter: brightness(0.3);
        }

        @keyframes celebratePulse {
            0%, 100% { transform: scale(1) ; box-shadow: 0 0 18px rgba(255, 105, 180, 0.6), 0 0 30px rgba(115, 56, 178, 0.6); }
            50% { transform: scale(1.03); box-shadow: 0 0 28px rgba(255, 105, 180, 0.85), 0 0 45px rgba(115, 56, 178, 0.7); }
        }

        @media (max-width: 600px) {
            #title {
                font-size: 6vw;
                margin-bottom: 2vh;
            }

            #cake {
                font-size: 70px;
            }

            #cake-container {
                width: 120px;
                height: 120px;
            }

            .candle {
                height: 25px;
                bottom: 65px;
            }

            #flame {
                bottom: 20px;
            }

            #back-btn {
                padding: 8px 16px;
                font-size: 12px;
                top: 15px;
                left: 15px;
            }
        }
    </style>
</head>
<body>
    <h1 id="title"><span class="emoji">🎂</span><span class="title-text">Happy Birthday<br>Stevanny</span><span class="emoji">✨</span></h1>

    <div id="cake-container">
        <div id="cake">🎂</div>
        <div class="candle">
            <div id="flame"></div>
        </div>
        <div class="candle">
            <div id="flame"></div>
        </div>
        <div class="candle">
            <div id="flame"></div>
        </div>
    </div>

    <button id="celebrate-btn">🥳 Click here to celebrate!</button>

    <button id="back-btn">← Back</button>

    <!-- Background Music -->
    <audio id="bg-music" loop preload="auto" playsinline crossorigin="anonymous">
        <!-- Free Happy Birthday piano instrumental -->
        <source src="https://www.soundjay.com/misc/sounds/happy-birthday-piano-instrumental.mp3" type="audio/mpeg">
        <source src="https://www.soundjay.com/misc/sounds/happy-birthday-piano-instrumental.wav" type="audio/wav">
        <!-- Fallback: Simple bell sound if piano not available -->
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" type="audio/wav">
    </audio>

    <script>
        const isEmbeddedShell = window.self !== window.top;
        let bgMusic = document.getElementById('bg-music');
        let musicStarted = false;
        let musicReady = false;
        let musicFallbackBound = false;
        let fadeInterval = null;
        let musicSourceFailed = false;
        let synthContext = null;
        let synthGain = null;
        let synthStarted = false;
        let synthLoopTimeout = null;

        const NOTE_FREQUENCIES = {
            C4: 261.63,
            D4: 293.66,
            E4: 329.63,
            F4: 349.23,
            G4: 392.00,
            A4: 440.00,
            AS4: 466.16,
            C5: 523.25
        };

        const HAPPY_BIRTHDAY_MELODY = [
            ['C4', 0.32], ['C4', 0.18], ['D4', 0.5], ['C4', 0.5], ['F4', 0.5], ['E4', 0.9],
            ['C4', 0.32], ['C4', 0.18], ['D4', 0.5], ['C4', 0.5], ['G4', 0.5], ['F4', 0.9],
            ['C4', 0.32], ['C4', 0.18], ['C5', 0.5], ['A4', 0.5], ['F4', 0.5], ['E4', 0.5], ['D4', 0.9],
            ['AS4', 0.32], ['AS4', 0.18], ['A4', 0.5], ['F4', 0.5], ['G4', 0.5], ['F4', 1.1]
        ];

        const MUSIC_STORAGE_KEY = 'birthdayMusicPlaying';
        const MUSIC_TIME_KEY = 'birthdayMusicTime';
        const MUSIC_VOLUME_KEY = 'birthdayMusicVolume';
        const DEFAULT_MUSIC_VOLUME = 0.45;

        // Music management functions
        function initMusic() {
            if (isEmbeddedShell) {
                return;
            }

            bgMusic.load();

            bgMusic.addEventListener('canplay', () => {
                musicReady = true;
            });

            bgMusic.addEventListener('error', () => {
                console.log('Music failed to load:', bgMusic.currentSrc || 'no source');
                musicSourceFailed = true;
            });

            const savedTime = parseFloat(sessionStorage.getItem(MUSIC_TIME_KEY) || '0');
            if (!Number.isNaN(savedTime) && savedTime > 0) {
                bgMusic.currentTime = savedTime;
            }

            // Check if music should be playing (from previous page)
            if (sessionStorage.getItem(MUSIC_STORAGE_KEY) === 'true') {
                startMusicWithFadeIn();
            }
        }

        function startMusicWithFadeIn() {
            if (musicStarted) return; // Prevent multiple starts
            musicStarted = true;
            const shouldResume = sessionStorage.getItem(MUSIC_STORAGE_KEY) === 'true';
            const savedTime = parseFloat(sessionStorage.getItem(MUSIC_TIME_KEY) || '0');
            const targetVolume = parseFloat(sessionStorage.getItem(MUSIC_VOLUME_KEY) || String(DEFAULT_MUSIC_VOLUME));

            if (musicSourceFailed || bgMusic.querySelectorAll('source').length === 0) {
                startSynthMusicWithFadeIn();
                return;
            }

            if (!Number.isNaN(savedTime) && savedTime > 0) {
                bgMusic.currentTime = savedTime;
            }

            // Set initial volume to 0
            bgMusic.volume = shouldResume ? targetVolume : 0;
            bgMusic.muted = false;

            // Try to start playing immediately (may be blocked by browser)
            const playPromise = bgMusic.play();

            if (playPromise !== undefined) {
                playPromise.then(() => {
                    if (shouldResume) {
                        bgMusic.volume = targetVolume;
                        persistMusicState();
                    } else {
                        performFadeIn();
                    }
                }).catch(error => {
                    console.log('Music autoplay blocked by browser, will start on user interaction:', error);
                    if (error && error.name !== 'NotAllowedError') {
                        musicSourceFailed = true;
                    }
                    // Set up fallback for user interaction
                    setupMusicFallback();
                });
            }
        }

        function performFadeIn() {
            if (fadeInterval) {
                clearInterval(fadeInterval);
            }

            // Fade in over 3 seconds to target volume
            const targetVolume = parseFloat(sessionStorage.getItem(MUSIC_VOLUME_KEY) || String(DEFAULT_MUSIC_VOLUME));
            const fadeDuration = 3000; // 3 seconds
            const fadeSteps = 60; // 60 fps
            const volumeStep = targetVolume / fadeSteps;
            const stepDuration = fadeDuration / fadeSteps;

            let currentStep = 0;
            fadeInterval = setInterval(() => {
                currentStep++;
                bgMusic.volume = Math.min(volumeStep * currentStep, targetVolume);

                if (currentStep >= fadeSteps) {
                    clearInterval(fadeInterval);
                    fadeInterval = null;
                    persistMusicState();
                }
            }, stepDuration);
        }

        function persistMusicState() {
            const audioPlaying = bgMusic && !bgMusic.paused && !bgMusic.ended;
            if (!audioPlaying && !synthStarted) {
                return;
            }

            sessionStorage.setItem(MUSIC_STORAGE_KEY, 'true');
            sessionStorage.setItem(MUSIC_VOLUME_KEY, String(DEFAULT_MUSIC_VOLUME));
            if (audioPlaying && !Number.isNaN(bgMusic.currentTime)) {
                sessionStorage.setItem(MUSIC_TIME_KEY, String(bgMusic.currentTime));
            }
        }

        function setupMusicFallback() {
            if (musicFallbackBound) return;
            musicFallbackBound = true;

            // Add event listeners for user interaction fallback
            const startMusicOnInteraction = () => {
                if (!musicStarted) {
                    musicStarted = true;
                }

                if (musicSourceFailed || bgMusic.querySelectorAll('source').length === 0) {
                    startSynthMusicWithFadeIn();
                    document.removeEventListener('click', startMusicOnInteraction);
                    document.removeEventListener('touchstart', startMusicOnInteraction);
                    document.removeEventListener('keydown', startMusicOnInteraction);
                    musicFallbackBound = false;
                    return;
                }

                bgMusic.muted = false;

                bgMusic.play().then(() => {
                    performFadeIn();
                    // Remove listeners after successful start
                    document.removeEventListener('click', startMusicOnInteraction);
                    document.removeEventListener('touchstart', startMusicOnInteraction);
                    document.removeEventListener('keydown', startMusicOnInteraction);
                    musicFallbackBound = false;
                }).catch(error => {
                    console.log('Fallback music start failed:', error);
                    musicSourceFailed = true;
                    startSynthMusicWithFadeIn();
                    document.removeEventListener('click', startMusicOnInteraction);
                    document.removeEventListener('touchstart', startMusicOnInteraction);
                    document.removeEventListener('keydown', startMusicOnInteraction);
                    musicFallbackBound = false;
                });
            };

            document.addEventListener('click', startMusicOnInteraction, { once: true });
            document.addEventListener('touchstart', startMusicOnInteraction, { once: true });
            document.addEventListener('keydown', startMusicOnInteraction, { once: true });
        }

        function ensureSynthContext() {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) {
                return null;
            }

            if (!synthContext) {
                synthContext = new AudioContextClass();
                synthGain = synthContext.createGain();
                synthGain.gain.value = 0;
                synthGain.connect(synthContext.destination);
            }

            return synthContext;
        }

        function playSynthMelody() {
            if (!synthContext || !synthGain) return;

            let cursor = synthContext.currentTime + 0.05;
            HAPPY_BIRTHDAY_MELODY.forEach(([note, duration]) => {
                const oscillator = synthContext.createOscillator();
                const noteGain = synthContext.createGain();
                const endTime = cursor + duration;

                oscillator.type = 'sine';
                oscillator.frequency.value = NOTE_FREQUENCIES[note];

                noteGain.gain.setValueAtTime(0.0001, cursor);
                noteGain.gain.linearRampToValueAtTime(0.18, cursor + 0.03);
                noteGain.gain.exponentialRampToValueAtTime(0.0001, endTime);

                oscillator.connect(noteGain);
                noteGain.connect(synthGain);

                oscillator.start(cursor);
                oscillator.stop(endTime);
                cursor = endTime + 0.03;
            });

            synthLoopTimeout = window.setTimeout(playSynthMelody, Math.max((cursor - synthContext.currentTime) * 1000, 1000));
        }

        function startSynthMusicWithFadeIn() {
            const ctx = ensureSynthContext();
            if (!ctx) return;

            const beginPlayback = () => {
                if (synthStarted) return;
                synthStarted = true;

                const now = ctx.currentTime;
                synthGain.gain.cancelScheduledValues(now);
                synthGain.gain.setValueAtTime(synthGain.gain.value, now);
                synthGain.gain.linearRampToValueAtTime(0.2, now + 1.8);
                playSynthMelody();
                sessionStorage.setItem(MUSIC_STORAGE_KEY, 'true');
                sessionStorage.setItem(MUSIC_VOLUME_KEY, String(DEFAULT_MUSIC_VOLUME));
            };

            if (ctx.state === 'suspended') {
                ctx.resume().then(beginPlayback).catch(error => {
                    console.log('Synth music start failed:', error);
                });
            } else {
                beginPlayback();
            }
        }

        function stopMusic() {
            if (bgMusic) {
                if (fadeInterval) {
                    clearInterval(fadeInterval);
                    fadeInterval = null;
                }
                bgMusic.pause();
                bgMusic.currentTime = 0;
                sessionStorage.setItem(MUSIC_STORAGE_KEY, 'false');
                sessionStorage.removeItem(MUSIC_TIME_KEY);
                musicStarted = false;
            }

            if (synthLoopTimeout) {
                clearTimeout(synthLoopTimeout);
                synthLoopTimeout = null;
            }

            if (synthGain && synthContext) {
                const now = synthContext.currentTime;
                synthGain.gain.cancelScheduledValues(now);
                synthGain.gain.setValueAtTime(synthGain.gain.value, now);
                synthGain.gain.linearRampToValueAtTime(0.0001, now + 0.3);
            }

            synthStarted = false;
        }

        // Initialize music on page load
        initMusic();
        setupMusicFallback();
        window.addEventListener('pagehide', persistMusicState);
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden' && !bgMusic.paused) {
                persistMusicState();
            }
        });
        // Create sparkles around the cake
        function createStarField() {
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'sparkle';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.width = Math.random() * 2 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.opacity = 0;
                star.style.animationDuration = Math.random() * 2 + 2 + 's';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationName = 'starTwinkle';
                star.style.boxShadow = '0 0 4px rgba(255,255,255,0.9)';
                document.body.appendChild(star);
            }
        }

        function createSparkles() {
            const cakeContainer = document.getElementById('cake-container');
            for (let i = 0; i < 15; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                const angle = (i / 15) * Math.PI * 2;
                const distance = 150;
                const x = window.innerWidth / 2 + Math.cos(angle) * distance;
                const y = window.innerHeight / 2 + Math.sin(angle) * distance;

                sparkle.style.left = x + 'px';
                sparkle.style.top = y + 'px';
                sparkle.style.animationDelay = (i * 0.1) + 's';
                sparkle.style.width = '4px';
                sparkle.style.height = '4px';
                sparkle.style.boxShadow = '0 0 12px rgba(255, 255, 255, 0.8)';
                document.body.appendChild(sparkle);
            }
        }

        // Create floating particles around cake
        function createParticles() {
            setInterval(() => {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const x = window.innerWidth / 2 + (Math.random() - 0.5) * 200;
                const y = window.innerHeight / 2 + 50;
                
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.setProperty('--tx', (Math.random() - 0.5) * 100 + 'px');
                document.body.appendChild(particle);

                setTimeout(() => particle.remove(), 3000);
            }, 300);
        }

        // Celebrate button handler (transition to fireworks page)
        document.getElementById('celebrate-btn').addEventListener('click', function() {
            persistMusicState();
            document.body.classList.add('screen-transition');
            setTimeout(() => {
                if (isEmbeddedShell) {
                    window.parent.postMessage({ type: 'birthday:navigate', page: 'fireworks.html' }, '*');
                } else {
                    window.location.href = 'fireworks.html';
                }
            }, 900);
        });

        // Back button handler
        document.getElementById('back-btn').addEventListener('click', function() {
            persistMusicState();
            document.body.style.opacity = '0';
            setTimeout(() => {
                if (isEmbeddedShell) {
                    window.parent.postMessage({ type: 'birthday:navigate', page: 'index.html' }, '*');
                } else {
                    window.location.href = 'index.html';
                }
            }, 500);
        });

        // Initialize when page loads
        createStarField();
        createSparkles();
        createParticles();

        // Add fade-in effect
        document.body.style.opacity = '0';
        document.body.style.transition = 'opacity 0.6s ease';
        requestAnimationFrame(() => {
            document.body.style.opacity = '1';
        });

        // Tap cake for sparkle burst
        document.getElementById('cake-container').addEventListener('click', function(e) {
            for (let i = 0; i < 15; i++) {
                const burst = document.createElement('div');
                burst.className = 'particle';
                burst.style.width = '5px';
                burst.style.height = '5px';
                burst.style.left = e.clientX + 'px';
                burst.style.top = e.clientY + 'px';
                burst.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'px');
                burst.style.animationDuration = '0.8s';
                document.body.appendChild(burst);
                setTimeout(() => burst.remove(), 800);
            }
        });
    </script>
</body>
</html>
